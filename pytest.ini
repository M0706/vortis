[pytest]
# Measure coverage of the application package only (not the tests themselves):
# counting test files inflates the number and makes the gate meaningless.
# --cov-fail-under=90 makes the suite FAIL if app coverage drops below 90%,
# guarding the live path against silent regressions.
#
# pythonpath=src lets tests import `vortis` straight from the source tree
# without an editable install.
pythonpath = src

addopts =
    --cov=vortis
    --cov-report=term-missing
    --cov-fail-under=90

testpaths = tests
