[pytest]
# Measure coverage of the application modules only — NOT the tests themselves
# (counting test files inflates the number and makes the gate meaningless).
# --cov-fail-under=90 makes the suite FAIL if app coverage drops below 90%,
# guarding the live path against silent regressions.
# main.py is omitted: it is a pure entrypoint (pragma: no cover) that no test
# imports, so including it only emits a "module never imported" warning.
addopts =
    --cov=async_tcp
    --cov=sync_tcp
    --cov=protocol
    --cov=store
    --cov=resp
    --cov-report=term-missing
    --cov-fail-under=90

testpaths = tests
