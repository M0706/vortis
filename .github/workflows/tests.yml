name: tests

# Run on PRs into the protected branches, and on direct pushes to them
# (so the branch tips themselves always have a green/red result on record).
on:
  pull_request:
    branches: [staging, master]
  push:
    branches: [staging, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # pytest.ini carries --cov-fail-under=90, so this step fails the job
      # if any test fails OR coverage drops below 90%.
      - name: Run tests with coverage gate
        run: pytest
